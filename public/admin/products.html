<!DOCTYPE html>
<html>
<head>
  <title>Products Management</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

 <script>
if (!localStorage.getItem("isAdminLoggedIn")) {
  window.location.href = "/admin/login.html";
}
</script>  

<h1>Products Management</h1>

<div class="container">

  <!-- LEFT SIDE (FORM) -->
  <div class="left">

    <input type="text" id="search" placeholder="Search Product...">
    <br><br>

    <button onclick="showForm()">Add Product</button>
    <input type="file" id="csvUpload">

    <!-- FORM -->
    <div id="productForm" style="display:none">

      <h2>Add Product</h2>

      <input type="text" id="name" placeholder="Product Name">

      <select id="variant">
        <option>500g</option>
        <option>1kg</option>
        <option>1.5kg</option>
        <option>2kg</option>
        <option>2.5kg</option>
        <option>3kg</option>
      </select>

      <input type="number" id="price" placeholder="Price">
      <input type="number" id="stock" placeholder="Stock">

      <h3>Product Images</h3>

      Front <input type="file" id="imgFront"><br><br>
      Back <input type="file" id="imgBack"><br><br>

      <button onclick="addProduct()">Save Product</button>

    </div>

  </div>

  <!-- RIGHT SIDE (TABLE) -->
  <div class="right">

    <table id="productTable" border="1" cellpadding="10">
      <tr>
        <th>Image</th>
        <th>Name</th>
        <th>Variant</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Actions</th>
      </tr>
    </table>

  </div>

</div>

<!-- JS FILE -->
<script src="../js/products.js"></script>

<!-- SHOW FORM FUNCTION -->
<script>
function showForm(){
  let form = document.getElementById("productForm");
  form.style.display = "block";
}
</script>

<script src="/js/auth.js"></script>

</body>
</html>
